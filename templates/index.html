<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClipForge</title>
<style>
  :root {
    --bg:#0d0d0f;--surface:#16161a;--border:#2a2a32;--accent:#7c5cfc;
    --accent2:#fc5c7d;--text:#e8e8f0;--muted:#6b6b80;--success:#4caf88;--error:#fc5c5c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;font-size:13px;min-height:100vh}
  header{padding:18px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  header h1{font-size:17px;font-weight:700;letter-spacing:.08em}
  header span{font-size:10px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:3px 8px;border-radius:4px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);height:calc(100vh - 55px)}
  .panel{background:var(--bg);padding:22px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
  .panel-label{font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:3px}
  .panel-title{font-size:14px;font-weight:600}
  input[type=text],textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 11px;border-radius:6px;font-family:inherit;font-size:12px;resize:vertical;outline:none;transition:border-color .15s}
  input[type=text]:focus,textarea:focus{border-color:var(--accent)}
  textarea{min-height:110px}
  button{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.04em}
  button:hover{opacity:.88}
  button:active{transform:scale(.98)}
  button.sec{background:var(--surface);border:1px solid var(--border);color:var(--text)}
  button:disabled{opacity:.4;cursor:not-allowed}
  .row{display:flex;gap:8px;align-items:flex-start}
  .row input{flex:1}
  .prog-wrap{background:var(--surface);border-radius:4px;height:4px;overflow:hidden}
  .prog{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .3s;border-radius:4px}
  .prog.run{animation:indeterminate 1.4s ease-in-out infinite;width:40%!important}
  @keyframes indeterminate{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
  .msg{font-size:11px;color:var(--muted);min-height:15px}
  .msg.ok{color:var(--success)}
  .msg.err{color:var(--error)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:center}
  .card img{width:76px;height:43px;object-fit:cover;border-radius:4px;background:var(--border)}
  .card-info .ctitle{font-weight:600;font-size:13px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px}
  .card-info .cmeta{color:var(--muted);font-size:11px}
  .tabs{display:flex;border-bottom:1px solid var(--border)}
  .tab{padding:7px 13px;cursor:pointer;font-size:11px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab-c{display:none;flex-direction:column;gap:8px}
  .tab-c.active{display:flex}
  .cw{position:relative}
  .cw textarea{padding-right:76px}
  .cbtn{position:absolute;top:8px;right:8px;padding:3px 9px;font-size:10px}
  .toggle-g{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .tog{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:11px;color:var(--muted);transition:all .15s}
  .tog.active{background:var(--accent);color:#fff;font-weight:600}
  .clip-row{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 13px;display:flex;align-items:center;gap:10px}
  .clip-row .nm{flex:1;font-size:12px}
  .clip-row .sz{color:var(--muted);font-size:11px}
  .clip-row a{color:var(--accent);font-size:11px;text-decoration:none}
  .clip-row a:hover{text-decoration:underline}
  .file-box{background:var(--surface);border:1px dashed var(--border);border-radius:6px;padding:14px;text-align:center;color:var(--muted);font-size:11px;cursor:pointer;transition:border-color .15s}
  .file-box:hover{border-color:var(--accent);color:var(--text)}
  .file-box input{display:none}
  .sep{height:1px;background:var(--border)}
  .hint{font-size:10px;color:var(--muted);line-height:1.6}
  label.lbl{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:5px}
</style>
</head>
<body>

<header>
  <h1>⬡ CLIPFORGE</h1>
  <span>FastAPI · yt-dlp · FFmpeg · OpenCV</span>
</header>

<div class="grid">

  <!-- PANEL 01: EXTRACT -->
  <div class="panel">
    <div><div class="panel-label">Panel 01</div><div class="panel-title">Extract</div></div>
    <div class="row">
      <input type="text" id="extract-url" placeholder="YouTube URL — youtu.be, watch?v=, /shorts/"/>
      <button id="extract-btn" onclick="startExtract()">Extract</button>
    </div>
    <div class="prog-wrap"><div class="prog" id="ep"></div></div>
    <div class="msg" id="es"></div>
    <div id="meta-card" style="display:none">
      <div class="card">
        <img id="meta-thumb" src="" alt=""/>
        <div class="card-info">
          <div class="ctitle" id="meta-title"></div>
          <div class="cmeta" id="meta-sub"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- PANEL 02: TRANSCRIPT -->
  <div class="panel">
    <div><div class="panel-label">Panel 02</div><div class="panel-title">Transcript</div></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('full')">Full Text</div>
      <div class="tab" onclick="switchTab('structured')">Structured</div>
      <div class="tab" onclick="switchTab('segments')">Raw Segments</div>
    </div>
    <div class="tab-c active" id="tab-full">
      <div class="cw">
        <textarea id="out-full" rows="13" readonly placeholder="Full transcript..."></textarea>
        <button class="cbtn sec" onclick="cp('out-full',this)">Copy</button>
      </div>
    </div>
    <div class="tab-c" id="tab-structured">
      <div class="hint">⟶ Direct input to the strategist prompt — copy this array</div>
      <div class="cw">
        <textarea id="out-transcript" rows="13" readonly placeholder="Merged [{start,end,text}] sentence array..."></textarea>
        <button class="cbtn sec" onclick="cp('out-transcript',this)">Copy</button>
      </div>
    </div>
    <div class="tab-c" id="tab-segments">
      <div class="cw">
        <textarea id="out-segments" rows="13" readonly placeholder="Raw yt-dlp [{start,duration,text}] segments..."></textarea>
        <button class="cbtn sec" onclick="cp('out-segments',this)">Copy</button>
      </div>
    </div>
  </div>

  <!-- PANEL 03: RENDER -->
  <div class="panel">
    <div><div class="panel-label">Panel 03</div><div class="panel-title">Render</div></div>
    <div class="toggle-g">
      <div class="tog active" id="tog-sliced" onclick="setMode('sliced')">SLICED_FROM_SOURCE</div>
      <div class="tog" id="tog-synth" onclick="setMode('synthetic')">SYNTHETIC_FROM_SCRATCH</div>
    </div>

    <!-- Sliced -->
    <div id="mode-sliced" style="display:flex;flex-direction:column;gap:10px">
      <div><label class="lbl">Source YouTube URL</label><input type="text" id="render-url" placeholder="https://youtube.com/watch?v=..."/></div>
      <div><label class="lbl">Clip Blueprint JSON (single clip object)</label>
        <textarea id="render-bp" rows="8" placeholder='{"timestamp_start":"00:01:32.000","timestamp_end":"00:01:55.200","hook_text_overlay":"..."}'></textarea>
      </div>
      <button onclick="startSliced()">⬡ Render Clip</button>
    </div>

    <!-- Synthetic -->
    <div id="mode-synthetic" style="display:none;flex-direction:column;gap:10px">
      <div><label class="lbl">Blueprint JSON</label>
        <textarea id="synth-bp" rows="6" placeholder='{"hook_text_overlay":"...","asset_assembly_instructions":{"text_to_speech_script":"..."}}'></textarea>
      </div>
      <div><label class="lbl">Scene Images (one per scene, ordered)</label>
        <label class="file-box">
          <input type="file" id="synth-imgs" accept="image/*" multiple onchange="setLabel(this,'il')"/>
          <span id="il">Click to upload scene images</span>
        </label>
      </div>
      <div><label class="lbl">Audio File (pre-generated TTS)</label>
        <label class="file-box">
          <input type="file" id="synth-audio" accept="audio/*" onchange="setLabel(this,'al')"/>
          <span id="al">Click to upload audio</span>
        </label>
      </div>
      <button onclick="startSynthetic()">⬡ Render Synthetic</button>
    </div>

    <div class="sep"></div>
    <div class="prog-wrap"><div class="prog" id="rp"></div></div>
    <div class="msg" id="rs"></div>
  </div>

  <!-- PANEL 04: CLIP LIBRARY -->
  <div class="panel">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div><div class="panel-label">Panel 04</div><div class="panel-title">Clip Library</div></div>
      <button class="sec" onclick="loadClips()" style="font-size:11px;padding:5px 11px">Refresh</button>
    </div>
    <div id="clip-list" style="display:flex;flex-direction:column;gap:7px">
      <div class="msg">No clips yet.</div>
    </div>
  </div>

</div>

<script>
// Tab switch
function switchTab(n) {
  const names=['full','structured','segments'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===n));
  names.forEach(id=>document.getElementById('tab-'+id).classList.toggle('active',id===n));
}

// Mode toggle
function setMode(m) {
  document.getElementById('mode-sliced').style.display    = m==='sliced'    ? 'flex':'none';
  document.getElementById('mode-synthetic').style.display = m==='synthetic' ? 'flex':'none';
  document.getElementById('tog-sliced').classList.toggle('active', m==='sliced');
  document.getElementById('tog-synth').classList.toggle('active',  m==='synthetic');
}

// Copy
function cp(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).value).then(()=>{
    const o=btn.textContent; btn.textContent='✓'; setTimeout(()=>btn.textContent=o, 1400);
  });
}

// File label
function setLabel(input, labelId) {
  const l=document.getElementById(labelId);
  l.textContent = input.files.length===1 ? input.files[0].name : input.files.length>1 ? `${input.files.length} files` : 'Click to upload';
}

// Job poller
function poll(jobId, progId, msgId, onDone, onFail) {
  const bar=document.getElementById(progId), msg=document.getElementById(msgId);
  bar.classList.add('run');
  const iv=setInterval(async()=>{
    try {
      const d=await(await fetch(`/api/job/${jobId}`)).json();
      if(d.state==='done'){
        clearInterval(iv); bar.classList.remove('run'); bar.style.width='100%';
        msg.className='msg ok'; onDone(d.data);
      } else if(d.state==='error'){
        clearInterval(iv); bar.classList.remove('run'); bar.style.width='0%';
        msg.className='msg err'; msg.textContent='✗ '+(d.error||'error'); if(onFail)onFail();
      }
    } catch(e){ clearInterval(iv); msg.className='msg err'; msg.textContent='✗ Network error'; }
  }, 900);
}

// Extract
async function startExtract() {
  const url=document.getElementById('extract-url').value.trim();
  if(!url) return;
  const btn=document.getElementById('extract-btn'); btn.disabled=true;
  const es=document.getElementById('es'); es.className='msg'; es.textContent='Fetching…';
  document.getElementById('ep').style.width='0%';
  document.getElementById('meta-card').style.display='none';
  try {
    const d=await(await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})})).json();
    poll(d.job_id,'ep','es', data=>{
      btn.disabled=false;
      es.textContent=`✓ ${data.title}`;
      document.getElementById('meta-thumb').src=data.thumbnail||'';
      document.getElementById('meta-title').textContent=data.title||'';
      document.getElementById('meta-sub').textContent=`${data.video_id} · ${data.duration}`;
      document.getElementById('meta-card').style.display='';
      document.getElementById('out-full').value=data.full_text||'';
      document.getElementById('out-transcript').value=JSON.stringify(data.transcript,null,2);
      document.getElementById('out-segments').value=JSON.stringify(data.segments,null,2);
    }, ()=>btn.disabled=false);
  } catch(e){ btn.disabled=false; es.className='msg err'; es.textContent='✗ Request failed'; }
}

// Render sliced
async function startSliced() {
  const url=document.getElementById('render-url').value.trim();
  const bpRaw=document.getElementById('render-bp').value.trim();
  const rs=document.getElementById('rs');
  if(!url||!bpRaw){ rs.className='msg err'; rs.textContent='✗ URL and blueprint required'; return; }
  let bp; try{bp=JSON.parse(bpRaw);}catch(e){rs.className='msg err';rs.textContent='✗ Invalid JSON';return;}
  rs.className='msg'; rs.textContent='Downloading and slicing…';
  document.getElementById('rp').style.width='0%';
  const d=await(await fetch('/api/render/sliced',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url,blueprint:bp})})).json();
  poll(d.job_id,'rp','rs', data=>{ rs.textContent=`✓ ${data.output}`; loadClips(); });
}

// Render synthetic
async function startSynthetic() {
  const bpRaw=document.getElementById('synth-bp').value.trim();
  const imgs=document.getElementById('synth-imgs').files;
  const audio=document.getElementById('synth-audio').files[0];
  const rs=document.getElementById('rs');
  if(!bpRaw){rs.className='msg err';rs.textContent='✗ Blueprint required';return;}
  if(!imgs.length){rs.className='msg err';rs.textContent='✗ Images required';return;}
  if(!audio){rs.className='msg err';rs.textContent='✗ Audio required';return;}
  try{JSON.parse(bpRaw);}catch(e){rs.className='msg err';rs.textContent='✗ Invalid JSON';return;}
  const fd=new FormData();
  fd.append('blueprint',bpRaw);
  for(const img of imgs) fd.append('images',img);
  fd.append('audio',audio);
  rs.className='msg'; rs.textContent='Uploading and rendering…';
  document.getElementById('rp').style.width='0%';
  const d=await(await fetch('/api/render/synthetic',{method:'POST',body:fd})).json();
  poll(d.job_id,'rp','rs', data=>{ rs.textContent=`✓ ${data.output}`; loadClips(); });
}

// Clip library
async function loadClips() {
  const clips=await(await fetch('/api/clips')).json();
  const list=document.getElementById('clip-list');
  if(!clips.length){list.innerHTML='<div class="msg">No clips yet.</div>';return;}
  list.innerHTML=clips.map(c=>`
    <div class="clip-row">
      <div class="nm">${c.filename}</div>
      <div class="sz">${c.size_mb} MB</div>
      <a href="/api/download/${c.filename}" download="${c.filename}">↓ Download</a>
    </div>`).join('');
}

document.getElementById('extract-url').addEventListener('keydown',e=>{ if(e.key==='Enter') startExtract(); });
loadClips();
</script>
</body>
</html>
