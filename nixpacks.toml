[phases.setup]
nixPkgs = ['...', 'ffmpeg', 'deno', 'nodejs_22']

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "pip install -U -r requirements.txt"
]

[phases.build]
cmds = [
  "mkdir -p downloads"
]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:${PORT:-8080} --workers 1 --threads 4 l"
